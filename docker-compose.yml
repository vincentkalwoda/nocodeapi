services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/nocodeapidb
      - SPRING_DATASOURCE_USERNAME=nocodeapiowner
      - SPRING_DATASOURCE_PASSWORD=nocodeapiowner
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    networks:
      - default
      - system_api-network

  db:
    image: postgres:16.4-alpine
    environment:
      - POSTGRES_DB=nocodeapidb
      - POSTGRES_USER=nocodeapiowner
      - POSTGRES_PASSWORD=nocodeapiowner
    ports:
      - "35432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

networks:
  system_api-network:
    external: true

volumes:
  postgres_data:
